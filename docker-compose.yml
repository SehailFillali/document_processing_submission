version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=local
      - DATABASE_URL=sqlite:///./data/extraction.db
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    command: uv run uvicorn doc_extract.api.main:app --host 0.0.0.0 --port 8000
    
  # Optional: PostgreSQL for production-like testing
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: doc_extract
      POSTGRES_PASSWORD: doc_extract
      POSTGRES_DB: extraction
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Only start if explicitly enabled
    profiles:
      - postgres

  minio:
    image: minio/minio:latest
    container_name: doc-extract-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    profiles:
      - minio

volumes:
  postgres_data:
  minio_data:
