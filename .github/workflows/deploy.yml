name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - name: Configure Docker
        run: gcloud auth configure-docker
      
      - name: Get GCR image tag
        id: image
        run: |
          IMAGE_TAG=$(date +%Y%m%d-%H%M%S)
          echo "tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "image=gcr.io/${{ secrets.GCP_PROJECT_ID }}/doc-extract:$IMAGE_TAG" >> $GITHUB_OUTPUT
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy doc-extract-api \
            --image ${{ steps.image.outputs.image }} \
            --platform managed \
            --region ${{ secrets.GCP_REGION }} \
            --service-account doc-extract-sa@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --allow-unauthenticated \
            --set-env-vars ENVIRONMENT=production \
            --set-env-vars GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT_ID }}
      
      - name: Verify deployment
        run: |
          SERVICE_URL=$(gcloud run services describe doc-extract-api --platform managed --region ${{ secrets.GCP_REGION }} --format 'value(status.url)')
          echo "Deployed to: $SERVICE_URL"
